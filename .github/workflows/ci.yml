name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build & test
    # macos-15 ships Xcode 16 / Swift 6, which is required for the
    # `--disable-swift-testing` flag used below (absent on older toolchains).
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test --parallel --disable-swift-testing --xunit-output .codeyam/swift-tests.xml
